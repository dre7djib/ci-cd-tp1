name: Backend CI

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev, staging, main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  HUSKY: '0'
  NODE_VERSION: '22'

jobs:

  publish-image:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      github.event.repository.fork == false &&
      (github.ref == 'refs/heads/staging' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        env:
          IMAGE_BASE: ghcr.io/${{ github.repository }}
        run: |
          IMAGE_LOWER=$(echo "$IMAGE_BASE" | tr '[:upper:]' '[:lower:]')
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "tags=${IMAGE_LOWER}:${VERSION},${IMAGE_LOWER}:latest" >> $GITHUB_OUTPUT
          else
            echo "tags=${IMAGE_LOWER}:${GITHUB_SHA},${IMAGE_LOWER}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.meta.outputs.tags }}"
          BUILD_ARGS=""
          for TAG in "${TAGS[@]}"; do BUILD_ARGS="$BUILD_ARGS -t $TAG"; done
          docker build $BUILD_ARGS -f Dockerfile .
          for TAG in "${TAGS[@]}"; do docker push "$TAG"; done